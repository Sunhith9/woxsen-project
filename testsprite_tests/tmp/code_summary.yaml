version: "2"
type: frontend
tech_stack:
  - HTML
  - JavaScript
  - CSS
routes:
  - path: /
    file: landing.html
    auth_required: false
    description: Portal landing page
  - path: /student
    file: index.html
    auth_required: false
    description: Student grievance portal and AI support chat
  - path: /admin
    file: Woxsen_Admin_Panel.html
    auth_required: false
    description: Admin support team panel to manage complaints
  - path: /department
    file: department_portal.html
    auth_required: false
    description: Department portal to respond to queries
features:
  - name: Student RAG Chat
    description: Chat with the RAG-based AI assistant for instant support
    files:
      - index.html
    entry_route: /student
    user_interactions:
      - Open Chat Widget
      - Type query into the chat input
      - Click send or press Enter
      - Receive direct answer or RAG response
    api_calls:
      - method: POST
        endpoint: /chat
    auth_required: false
  - name: Grievance Registration
    description: Submit a formal grievance with category, description and urgency
    files:
      - index.html
    entry_route: /student
    user_interactions:
      - Click register grievance button
      - Fill form fields
      - Submit grievance
    api_calls:
      - method: POST
        endpoint: /api/v1/notify
    auth_required: false
known_limitations: []

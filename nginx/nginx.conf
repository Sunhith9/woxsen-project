# ─────────────────────────────────────────────────────────────────────────────
# NGINX configuration – Woxsen University Platform
# ─────────────────────────────────────────────────────────────────────────────
# Features:
#   • Round-robin upstream load balancing across API containers
#   • Gzip compression for text assets
#   • Static HTML portals served directly by NGINX (no API hit)
#   • Security headers on all responses
#   • Rate limiting: 30 req/s per IP on /api/
#   • HTTP → HTTPS redirect (uncomment TLS block when cert is available)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    client_max_body_size 20M;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Rate Limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ── Upstream API Pool ────────────────────────────────────────────────────
    # Docker Compose will resolve 'api' to all running replica IPs
    upstream woxsen_api {
        server api:8000;
        keepalive 64;
    }

    # ── HTTP server ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Uncomment to redirect HTTP → HTTPS once you have a cert:
        # return 301 https://$host$request_uri;

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Content-Type-Options   nosniff           always;
        add_header X-Frame-Options          SAMEORIGIN        always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          strict-origin-when-cross-origin always;
        add_header Permissions-Policy       "geolocation=(), microphone=()" always;

        # ── Static portals ───────────────────────────────────────────────
        root /usr/share/nginx/html;

        location = / {
            try_files /index.html =404;
        }

        location = /admin {
            try_files /Woxsen_Admin_Panel.html =404;
        }

        location = /department {
            try_files /department_portal.html =404;
        }

        location = /student {
            try_files /student_portal.html =404;
        }

        # Serve static assets (images, JS, CSS) with long cache
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|css|js)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Login rate limit ─────────────────────────────────────────────
        location /api/login {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass         http://woxsen_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── API proxy ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            proxy_pass         http://woxsen_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Metrics endpoint (internal access only)
        location /metrics {
            allow 172.0.0.0/8;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://woxsen_api;
        }
    }

    # ── HTTPS server (TLS) ───────────────────────────────────────────────────
    # Uncomment and place cert/key under ./nginx/ssl/
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... same location blocks as above ...
    # }
}
